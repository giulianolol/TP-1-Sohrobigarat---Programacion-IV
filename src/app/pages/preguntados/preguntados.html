<div class="preguntados-page">

  <div class="preguntados-overlay">

    <div class="card-preguntados">

      <h1 class="titulo-preguntados">
        Preguntados Rick & Morty
      </h1>

      <p class="subtitulo-preguntados">
        Descifra al personaje correcto dentro del multiverso.
      </p>

      <h3 class="puntaje">
        Puntaje: {{ puntaje }}
      </h3>

      @if (cargando) {

        <h4 class="cargando">

          Invocando personaje...

        </h4>

      }

      @if (!cargando && !perdio) {

        <div class="imagen-container">

          <img
            [src]="personajeCorrecto.image"
            class="personaje-img">

        </div>

        <div class="botones-container">

          @for (personaje of personajes; track personaje.id) {

            <button
              class="btn-personaje"
              (click)="responder(personaje.name)">

              {{ personaje.name }}

            </button>

          }

        </div>

      }

      @if (perdio) {

        <div class="alert-perdio mt-4">

          🔮 El portal se ha cerrado... Perdiste.

        </div>

        <button
          class="btn-reiniciar mt-4"
          (click)="reiniciar()">

          Jugar otra vez

        </button>

      }

    </div>

  </div>

</div>
