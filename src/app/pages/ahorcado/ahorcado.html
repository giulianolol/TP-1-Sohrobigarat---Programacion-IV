<div class="ahorcado-bg">

  <div class="container text-center pt-5">

    <div class="card-ahorcado p-4">

      <h1 class="mb-4">
        Juego del Ahorcado
      </h1>

      <h4 class="mb-3">
        Puntaje: {{ puntaje }}
      </h4>

      <!-- IMAGEN AHORCADO -->

      <div class="ahorcado-img-container">

        <img
          [src]="imagenAhorcado"
          class="ahorcado-img">

      </div>

      <!-- PALABRA -->

      <h2 class="palabra mb-4">

        {{ palabraOculta.join(' ') }}

      </h2>

      <!-- INTENTOS -->

      <h4 class="mb-4">

        Intentos restantes:
        {{ intentos }}

      </h4>

      <!-- LETRAS -->

      <div class="letras-container mt-4">

        @for (letra of abecedario; track letra) {

          <button
            class="btn btn-dark letra-btn"
            [disabled]="
              letrasUsadas.includes(letra)
              || gano
              || perdio
            "
            (click)="seleccionarLetra(letra)">

            {{ letra }}

          </button>

        }

      </div>

      <!-- GANÓ -->

      @if (gano) {

        <div class="alert alert-success mt-4">

          🔮 ¡Ganaste!

        </div>

      }

      <!-- PERDIÓ -->

      @if (perdio) {

        <div class="alert alert-danger mt-4">

          ☠️ Perdiste.
          La palabra era:

          <strong>
            {{ palabraSecreta }}
          </strong>

        </div>

      }

      <!-- REINICIAR -->

      <button
        class="btn btn-primary mt-4"
        (click)="reiniciar()">

        Siguiente

      </button>

    </div>

  </div>

</div>
