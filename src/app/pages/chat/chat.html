<div class="chat-page">

  <div class="chat-overlay">

    <div class="chat-container">

      <h1 class="titulo-chat">
        Sala de Chat
      </h1>

      <p class="subtitulo-chat">
        Conversa con las almas del portal místico.
      </p>

      <div class="mensajes">

        @for (msg of mensajes; track msg.id) {

          <div
            class="mensaje"
            [class.mio]="esMio(msg.usuario)">

            <div class="info">

              <strong>
                {{ msg.usuario }}
              </strong>

              <span>
                {{ msg.fecha | date:'HH:mm' }}
              </span>

            </div>

            <div class="texto">

              {{ msg.mensaje }}

            </div>

          </div>

        }

      </div>

      <div class="enviar-container">

        <input
          [(ngModel)]="nuevoMensaje"
          placeholder="Escribe un mensaje..."
          class="input-chat">

        <button
          (click)="enviarMensaje()"
          class="btn-chat">

          Enviar

        </button>

      </div>

    </div>

  </div>

</div>
