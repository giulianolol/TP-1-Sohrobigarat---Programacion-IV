<div class="chat-container">

  <h1 class="text-center mb-4">
    💬 Sala de Chat
  </h1>

  <div class="mensajes">

    <div
      *ngFor="let msg of mensajes"
      class="mensaje"
      [class.mio]="esMio(msg.usuario)">

      <div class="info">

        <strong>
          {{ msg.usuario }}
        </strong>

        <span>
          {{ msg.fecha | date:'HH:mm' }}
        </span>

      </div>

      <div class="texto">

        {{ msg.mensaje }}

      </div>

    </div>

  </div>

  <div class="enviar-container">

    <input
      [(ngModel)]="nuevoMensaje"
      placeholder="Escribe un mensaje..."
      class="form-control">

    <button
      (click)="enviarMensaje()"
      class="btn btn-primary">

      Enviar

    </button>

  </div>

</div>
