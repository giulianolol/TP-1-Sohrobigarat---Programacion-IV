<div class="container text-center mt-5">
  <h1>🎮 Sala de Juegos</h1>
  <p>Bienvenido a la plataforma</p>
  
  <ng-container *ngIf="user$ | async as user">
    <h3>
      Bienvenido
      {{ $any(user).user_metadata?.nombre }}
      {{ $any(user).user_metadata?.apellido }}
    </h3>
    <button (click)="logout()" class="btn btn-danger m-2">Cerrar sesión</button>
  </ng-container>

  <ng-template #noLogueado>
    <!-- A lo mejor saco esto, revisar -->
  </ng-template>

</div>
