<div class="container text-center mt-5">

  <h1>🎮 Sala de Juegos</h1>
  <p>Inicia sesión para comenzar a jugar :)</p>

  <!-- LOGUEADO -->
  <ng-container *ngIf="user$ | async as user; else noLogueado">

    <h3>
      Bienvenido
      {{ $any(user).user_metadata?.nombre }}
      {{ $any(user).user_metadata?.apellido }}
    </h3>

    <button (click)="logout()" class="btn btn-danger m-2">
      Cerrar sesión
    </button>

  </ng-container>

  <!-- NO LOGUEADO -->
  <ng-template #noLogueado>
    <h4>Bienvenido invitado</h4>
    <p>Por favor inicia sesión o regístrate para jugar</p>
  </ng-template>

</div>
