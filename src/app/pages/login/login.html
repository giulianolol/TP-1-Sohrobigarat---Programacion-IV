<div class="container mt-5">
  <h2>Login</h2>

  <input [(ngModel)]="email" placeholder="Email" class="form-control mb-2">
  <input [(ngModel)]="password" type="password" placeholder="Contraseña" class="form-control mb-2">

  <button (click)="login()" class="btn btn-primary w-100">Ingresar</button>

  <div *ngIf="error" class="alert alert-danger mt-3" role="alert">
  {{ error }}
</div>
</div>
