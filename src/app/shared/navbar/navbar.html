<nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">

  <div class="ms-auto">

    <a routerLink="/" class="nav-btn me-2">
      Home
    </a>
    
    @if (user$ | async; as user) {
    @if (auth.isAdmin(user)) {

      <a
        routerLink="/resultados-encuesta"
        routerLinkActive="active-link"
        class="nav-btn me-2">

        Admin

      </a>

    }
  }

    @if (!(user$ | async)) {

      <a routerLink="/login" class="nav-btn me-2">
        Login
      </a>

      <a routerLink="/registro" class="nav-btn me-2">
        Registro
      </a>

    }

    @else {

      <a routerLink="/quien-soy" class="nav-btn me-2">
        Quién Soy
      </a>

      <a
        (click)="logout()"
        class="nav-btn me-2"
        style="cursor:pointer;">

        Logout

      </a>

    }

  </div>

</nav>
